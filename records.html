<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Personal Records — PUBG</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:     #14130f;
  --panel:  #1e1c17;
  --line:   #38342c;
  --text:   #e8e3d8;
  --muted:  #9a9385;
  --accent: #f4a300;
  --blue:   #4a9edd;
  --ok:     #8fae5d;
  --danger: #d7443e;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  padding: 24px 16px;
}

.wrap { max-width: 1100px; margin: 0 auto; }

h1 {
  font-family: Oswald, system-ui, sans-serif;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--accent);
  font-size: 28px;
  margin-bottom: 2px;
}
.subtitle { color: var(--muted); font-size: 13px; margin-bottom: 24px; }

.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 18px;
  margin-bottom: 14px;
}

.loading { color: var(--muted); font-style: italic; padding: 20px 0; font-size: 13px; }

.records-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

.record-card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 16px 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.record-trophy {
  font-size: 24px;
  line-height: 1;
}

.record-name {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.record-value {
  font-family: Oswald, system-ui, sans-serif;
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}

.record-player {
  font-size: 12px;
  font-weight: 600;
}

.record-date {
  font-size: 11px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.record-date a {
  color: var(--muted);
  text-decoration: none;
  font-size: 12px;
  transition: color .15s;
}
.record-date a:hover { color: var(--accent); }

/* ── Site nav ──────────────────────────────────────────────────────────── */
#siteNav { position: fixed; top: 10px; left: 10px; z-index: 9000; }
#siteNavBtn {
  width: 34px; height: 34px;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 8px; color: var(--accent);
  font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .15s;
}
#siteNavBtn:hover { border-color: var(--accent); }
#siteNavMenu {
  display: none; position: absolute; top: 40px; left: 0;
  background: var(--panel); border: 1px solid var(--line);
  border-radius: 10px; padding: 6px;
  min-width: 200px; box-shadow: 0 8px 24px rgba(0,0,0,.6);
}
#siteNavMenu.open { display: block; }
#siteNavMenu a {
  display: block; padding: 9px 14px;
  color: var(--text); text-decoration: none;
  border-radius: 7px; font-size: 13px;
  font-family: Oswald, system-ui, sans-serif;
  text-transform: uppercase; letter-spacing: .5px;
  transition: background .1s, color .1s;
}
#siteNavMenu a:hover { background: rgba(244,163,0,.12); color: var(--accent); }
#siteNavMenu a.nav-cur { color: var(--accent); pointer-events: none; }
#siteNavMenu .nav-sep { height: 1px; background: var(--line); margin: 5px 8px; }
</style>
</head>

<body>
<div id="siteNav">
  <button id="siteNavBtn" onclick="toggleSiteNav()" title="Navigate">&#9776;</button>
  <div id="siteNavMenu">
    <a href="index.html">Home</a>
    <div class="nav-sep"></div>
    <a href="stats.html">PUBG Stats</a>
    <a href="mapanalysis.html">Map Analysis</a>
    <a href="match.html">Match Analysis</a>
    <a href="records.html" class="nav-cur">Personal Records</a>
    <a href="pubg.html">Loadout Planner</a>
  </div>
</div>

<div class="wrap">

  <h1>Personal Records</h1>
  <p class="subtitle">D282 &amp; S821 — all-time bests across every match played</p>

  <div id="recordsContainer"><p class="loading">Loading…</p></div>

</div>

<script>
// Keep SCORE_CFG in sync across stats.html / match.html / records.html
const SCORE_CFG = {
  kill:           { pts: 100, soloPts: 200 },
  knock:          { pts: 50,  soloPts: 100 },
  damage:         { pts: 1,   soloPts: 2   },
  revive:         { pts: 50  },
  bc:             { pts: 100 },
  death:          { pts: -100 },
  knocked:        { pts: -50  },
  survivalPerMin: 2,
  placement:      { 1: 150, 2: 100, 3: 50, 5: 40, 10: 20 },
};

function fmtTs(iso) {
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getFullYear()).slice(-2)} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function computeExactScore(events, player, pStats) {
  const partner = player === 'D282' ? 'S821' : 'D282';
  const partnerKnocks  = events.filter(e => e.type === 'knocked' && e.player === partner);
  const partnerRevives = events.filter(e => (e.type === 'revive' || e.type === 'blue_chip_revive') && e.target === partner);
  const partnerDeath   = events.find(e => e.type === 'death' && e.player === partner);
  function isSoloAt(t) {
    if (partnerDeath && partnerDeath.t < t) return true;
    const prev = partnerKnocks.filter(k => k.t < t);
    if (!prev.length) return false;
    const last = prev[prev.length - 1];
    const revAfter  = partnerRevives.some(r => r.t > last.t && r.t < t);
    const diedAfter = partnerDeath && partnerDeath.t > last.t && partnerDeath.t < t;
    return !revAfter && !diedAfter;
  }
  const C = SCORE_CFG;
  let score = 0;
  for (const e of events) {
    if (e.player !== player) continue;
    const solo = ['kill','knockdown','dmg_dealt'].includes(e.type) && isSoloAt(e.t);
    switch (e.type) {
      case 'kill':             score += solo ? C.kill.soloPts    : C.kill.pts; break;
      case 'knockdown':        score += solo ? C.knock.soloPts   : C.knock.pts; break;
      case 'dmg_dealt':        score += (e.damage || 0) * (solo ? C.damage.soloPts : C.damage.pts); break;
      case 'revive':           score += C.revive.pts; break;
      case 'blue_chip_revive': score += C.bc.pts; break;
      case 'death':            score += C.death.pts; break;
      case 'knocked':          score += C.knocked.pts; break;
    }
  }
  if (pStats) {
    score += Math.floor((pStats.survival_s || 0) / 60) * C.survivalPerMin;
    const pl = pStats.placement || 99;
    score += pl <= 1 ? C.placement[1] : pl <= 2 ? C.placement[2] : pl <= 3 ? C.placement[3] : pl <= 5 ? C.placement[5] : pl <= 10 ? C.placement[10] : 0;
  }
  return score;
}

async function boot() {
  if (location.protocol === 'file:') {
    document.getElementById('recordsContainer').innerHTML =
      `<p style="color:var(--danger);padding:20px 0;line-height:1.8">
         <strong>Cannot load data when opened as a local file.</strong><br>
         Run <code style="background:#2a2720;padding:2px 6px;border-radius:3px">serve.bat</code>
         then open via <a href="http://localhost:8080/records.html" style="color:var(--accent)">http://localhost:8080/records.html</a>
       </p>`;
    return;
  }

  let matches;
  try {
    matches = await fetch('stats-data/matches.json').then(r => r.json());
  } catch (err) {
    document.getElementById('recordsContainer').innerHTML =
      `<p style="color:var(--danger);padding:20px 0">Failed to load data. <small>${err.message}</small></p>`;
    return;
  }

  const duo = matches.filter(m =>
    m.players['D282']?.placement != null && m.players['S821']?.placement != null
  ).sort((a, b) => a.created_at.localeCompare(b.created_at));

  if (!duo.length) {
    document.getElementById('recordsContainer').innerHTML = '<p style="color:var(--muted);padding:20px 0">No duo matches found.</p>';
    return;
  }

  // Load individual match files for solo kill computation
  document.getElementById('recordsContainer').innerHTML = '<p class="loading">Loading match details…</p>';
  const matchFiles = await Promise.all(
    duo.map(m => fetch(`stats-data/matches/${m.match_id}.json`)
      .then(r => r.ok ? r.json() : null)
      .catch(() => null))
  );

  const records = computeRecords(duo, matchFiles);
  render(records);
}

function soloKillsFromEvents(events, player) {
  const partner = player === 'D282' ? 'S821' : 'D282';
  const partnerKnocks  = events.filter(e => e.type === 'knocked' && e.player === partner);
  const partnerRevives = events.filter(e => (e.type === 'revive' || e.type === 'blue_chip_revive') && e.target === partner);
  const partnerDeath   = events.find(e => e.type === 'death' && e.player === partner);

  return events.filter(e => e.type === 'kill' && e.player === player).filter(e => {
    const t = e.t;
    if (partnerDeath && partnerDeath.t < t) return true;
    // Find last knock before t
    const lastKnock = partnerKnocks.filter(k => k.t < t).sort((a, b) => b.t - a.t)[0];
    if (!lastKnock) return false;
    // Check if partner was revived or died after that knock but before t
    const revivedAfter = partnerRevives.some(r => r.t > lastKnock.t && r.t < t);
    const diedAfter    = partnerDeath && partnerDeath.t > lastKnock.t && partnerDeath.t < t;
    return !revivedAfter && !diedAfter;
  }).length;
}

function computeRecords(matches, matchFiles) {
  const recs = {};

  const chk = (rec, val, date, id) => val > rec.v ? { v: val, date, id } : rec;

  let best282 = { kills:{v:-1,date:'',id:''}, dmg:{v:-1,date:'',id:''}, revives:{v:-1,date:'',id:''}, bc:{v:-1,date:'',id:''}, surv:{v:-1,date:'',id:''}, solo:{v:-1,date:'',id:''}, score:{v:-Infinity,date:'',id:''} };
  let best821 = { kills:{v:-1,date:'',id:''}, dmg:{v:-1,date:'',id:''}, revives:{v:-1,date:'',id:''}, bc:{v:-1,date:'',id:''}, surv:{v:-1,date:'',id:''}, solo:{v:-1,date:'',id:''}, score:{v:-Infinity,date:'',id:''} };
  let bestDuo = { kills:{v:-1,date:'',id:''}, dmg:{v:-1,date:'',id:''}, score:{v:-Infinity,date:'',id:''} };

  let curStreak = 0, maxStreak = 0, maxStreakEnd = '';
  const byDay = {};

  for (let i = 0; i < matches.length; i++) {
    const m      = matches[i];
    const mf     = matchFiles?.[i];
    const pd     = m.players['D282'], ps = m.players['S821'];
    const dayKey = m.created_at.slice(0, 10);
    const d      = fmtTs(m.created_at);
    const id     = m.match_id;
    byDay[dayKey] = (byDay[dayKey] || 0) + 1;

    if (pd?.placement === 1) { curStreak++; if (curStreak > maxStreak) { maxStreak = curStreak; maxStreakEnd = dayKey; } }
    else curStreak = 0;

    if (pd) {
      best282.kills   = chk(best282.kills,   pd.kills || 0,       d, id);
      best282.dmg     = chk(best282.dmg,     pd.damage || 0,      d, id);
      best282.revives = chk(best282.revives, pd.revives || 0,     d, id);
      best282.bc      = chk(best282.bc,      pd.blue_chips || 0,  d, id);
      best282.surv    = chk(best282.surv,    pd.survival_s || 0,  d, id);
    }
    if (ps) {
      best821.kills   = chk(best821.kills,   ps.kills || 0,       d, id);
      best821.dmg     = chk(best821.dmg,     ps.damage || 0,      d, id);
      best821.revives = chk(best821.revives, ps.revives || 0,     d, id);
      best821.bc      = chk(best821.bc,      ps.blue_chips || 0,  d, id);
      best821.surv    = chk(best821.surv,    ps.survival_s || 0,  d, id);
    }
    if (pd && ps) {
      bestDuo.kills = chk(bestDuo.kills, (pd.kills || 0) + (ps.kills || 0),   d, id);
      bestDuo.dmg   = chk(bestDuo.dmg,   (pd.damage || 0) + (ps.damage || 0), d, id);
    }

    if (mf?.events) {
      const sk282  = soloKillsFromEvents(mf.events, 'D282');
      const sk821  = soloKillsFromEvents(mf.events, 'S821');
      best282.solo = chk(best282.solo, sk282, d, id);
      best821.solo = chk(best821.solo, sk821, d, id);
      const ps282  = mf.match_stats?.['D282'] || pd || {};
      const ps821  = mf.match_stats?.['S821'] || ps || {};
      const sc282  = computeExactScore(mf.events, 'D282', ps282);
      const sc821  = computeExactScore(mf.events, 'S821', ps821);
      best282.score = chk(best282.score, sc282,        d, id);
      best821.score = chk(best821.score, sc821,        d, id);
      bestDuo.score = chk(bestDuo.score, sc282 + sc821, d, id);
    }
  }

  const topDay = Object.entries(byDay).sort((a, b) => b[1] - a[1])[0] || ['—', 0];

  // Best session avg placement — day with ≥3 games
  const sessions = Object.entries(byDay)
    .filter(([, n]) => n >= 3)
    .map(([date, n]) => {
      const ms = matches.filter(m => m.created_at.slice(0, 10) === date);
      const avgPl = ms.reduce((s, m) => s + (m.players['D282']?.placement || 99), 0) / ms.length;
      return { date, n, avgPl };
    })
    .sort((a, b) => a.avgPl - b.avgPl);

  const fmtDmg = v => Math.round(v).toLocaleString();

  recs.kills282  = { ...best282.kills,   player:'D282', label:'Most kills',           trophy:'🎯' };
  recs.kills821  = { ...best821.kills,   player:'S821', label:'Most kills',           trophy:'🎯' };
  recs.killsDuo  = { ...bestDuo.kills,   player:'Duo',  label:'Most kills (combined)',trophy:'🎯' };
  recs.dmg282    = { ...best282.dmg,     player:'D282', label:'Most damage',          trophy:'💥', fmt: fmtDmg };
  recs.dmg821    = { ...best821.dmg,     player:'S821', label:'Most damage',          trophy:'💥', fmt: fmtDmg };
  recs.dmgDuo    = { ...bestDuo.dmg,     player:'Duo',  label:'Most damage (combined)',trophy:'💥', fmt: fmtDmg };
  recs.revives282= { ...best282.revives, player:'D282', label:'Most revives',         trophy:'💊' };
  recs.revives821= { ...best821.revives, player:'S821', label:'Most revives',         trophy:'💊' };
  recs.bc282     = { ...best282.bc,      player:'D282', label:'Most blue chip revives',trophy:'🔵' };
  recs.bc821     = { ...best821.bc,      player:'S821', label:'Most blue chip revives',trophy:'🔵' };
  recs.surv282   = { ...best282.surv,    player:'D282', label:'Longest survival',     trophy:'⏱', fmt: mmss };
  recs.surv821   = { ...best821.surv,    player:'S821', label:'Longest survival',     trophy:'⏱', fmt: mmss };

  if (best282.solo.v >= 0) {
    recs.solo282 = { ...best282.solo, player:'D282', label:'Most solo kills', trophy:'🔫' };
    recs.solo821 = { ...best821.solo, player:'S821', label:'Most solo kills', trophy:'🔫' };
  }

  if (best282.score.v > -Infinity) {
    const fmtScore = v => (v >= 0 ? '+' : '') + Math.round(v);
    recs.score282 = { ...best282.score, player:'D282', label:'Best match score', trophy:'⭐', fmt: fmtScore };
    recs.score821 = { ...best821.score, player:'S821', label:'Best match score', trophy:'⭐', fmt: fmtScore };
    recs.scoreDuo = { ...bestDuo.score, player:'Duo',  label:'Best match score (combined)', trophy:'⭐', fmt: fmtScore };
  }

  recs.winStreak    = { v:maxStreak, date:maxStreakEnd, id:'', player:'Duo', label:'Longest win streak',    trophy:'🏆', fmt: v => v + ' wins' };
  recs.mostGamesDay = { v:topDay[1], date:topDay[0],   id:'', player:'Duo', label:'Most games in one day', trophy:'📅', fmt: v => v + ' games' };

  if (sessions.length) {
    const s = sessions[0];
    recs.bestSession = { v:s.avgPl, date:s.date, id:'', player:'Duo', label:'Best session avg placement (≥3 games)', trophy:'📈', fmt: v => '#' + v.toFixed(1) };
  }

  return recs;
}

function mmss(s) {
  if (s == null || s < 0) return '—';
  s = Math.round(s);
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
}

function render(records) {
  const el = document.getElementById('recordsContainer');
  const cards = Object.values(records).map(r => {
    const value = r.fmt ? r.fmt(r.v) : r.v;
    const playerCol = r.player === 'D282' ? 'var(--accent)' : r.player === 'S821' ? 'var(--blue)' : 'var(--text)';
    const matchLink = r.id
      ? `<a href="match.html?id=${r.id}" title="View match">→ match</a>`
      : '';
    return `<div class="record-card">
      <div class="record-trophy">${r.trophy}</div>
      <div class="record-name">${r.label}</div>
      <div class="record-value">${value}</div>
      <div class="record-player" style="color:${playerCol}">${r.player}</div>
      <div class="record-date">${r.date}${matchLink ? ' ' + matchLink : ''}</div>
    </div>`;
  }).join('');

  el.innerHTML = `<div class="records-grid">${cards}</div>`;
}

function toggleSiteNav() {
  document.getElementById('siteNavMenu').classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if (!document.getElementById('siteNav').contains(e.target))
    document.getElementById('siteNavMenu').classList.remove('open');
});

boot();
</script>
</body>
</html>
